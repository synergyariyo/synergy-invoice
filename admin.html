<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synergy Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --panel-bg: rgba(13, 16, 33, 0.65);
            --border-color: rgba(255,255,255,0.06);
            --primary-color: #9333ea;
            --accent: #06b6d4;
            --text-primary: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(147, 51, 234, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(6, 182, 212, 0.08) 0%, transparent 40%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .dashboard {
            width: 500px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 20px;
            backdrop-filter: blur(25px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #a855f7, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.5rem;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-primary);
            text-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: 0.2s;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(147, 51, 234, 0.4); }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; display: none; margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Synergy Performance Hub</h1>
        
        <div class="stat-card">
            <div class="stat-label">Total Global Visitors</div>
            <div id="loader" class="loader"></div>
            <div class="stat-value" id="visit-count">---</div>
        </div>

        <p style="color: #94a3b8; font-size: 0.75rem; line-height: 1.6; margin-bottom: 1.5rem;">
            Tracking worldwide sessions across all devices using the standard Free-Tier CounterAPI. This is a community-driven statistics tool.
        </p>

        <a href="app.html" class="btn">Launch App</a>
        <a href="index.html" class="btn" style="background: rgba(255,255,255,0.05); margin-left:10px;">Back to Home</a>
        <button class="btn" style="background: rgba(255,255,255,0.05); margin-left:10px;" onclick="fetchStats()">Refresh Data</button>
    </div>

    <script>
        async function fetchStats() {
            const countEl = document.getElementById('visit-count');
            const loader = document.getElementById('loader');
            
            countEl.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch('https://api.counterapi.dev/v1/synergy_v1_live/global_visits');
                const data = await res.json();
                countEl.textContent = data.count.toLocaleString();
            } catch (err) {
                countEl.textContent = "Error";
                console.error(err);
            } finally {
                loader.style.display = 'none';
                countEl.style.display = 'block';
            }
        }

        // Initial fetch
        fetchStats();
    </script>
</body>
</html>
