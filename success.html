<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Successful | Synergy Pro</title>
    
    <link rel="icon" type="image/png" href="synergy-logo.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

    <style>
        body { background: #050510; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; font-family: 'Plus Jakarta Sans', sans-serif; }
        .success-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 4rem; border-radius: 40px; backdrop-filter: blur(20px); max-width: 500px; width: 90%; }
        .check-circle { width: 100px; height: 100px; background: #10b981; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 2rem; box-shadow: 0 0 50px rgba(16,185,129,0.4); animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; font-weight: 950; margin-bottom: 1rem; letter-spacing: -1.5px; }
        p { color: rgba(255,255,255,0.5); font-size: 1.1rem; line-height: 1.6; margin-bottom: 2rem; }
        .status-msg { margin-bottom: 2rem; font-weight: 800; color: #10b981; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="check-circle">✓</div>
        <h1>Welcome to Pro.</h1>
        <p>Synergy has detected your successful payment. Your account is being promoted globally...</p>
        
        <div id="status-display" class="status-msg">Verifying Premium Credentials...</div>
        
        <a href="dashboard.html" class="btn btn-primary" style="display:inline-block; padding: 1.1rem 2.5rem; text-decoration: none;">Launch Dashboard &rarr;</a>
    </div>

    <script>
        // --- AUTO-ACTIVATION ENGINE ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const urlParams = new URLSearchParams(window.location.search);
                const status = urlParams.get('status');
                const ref = urlParams.get('reference') || urlParams.get('ref') || 'AUTO_CHKT';

                // Check for real payment indicators (Stripe/Paystack standard params)
                if (status === 'success' || ref) {
                    await db.collection('profiles').doc(user.uid).set({
                        isPro: true,
                        premiumRef: ref,
                        activatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    
                    document.getElementById('status-display').innerText = "✅ Premium Status Activated!";
                    console.log("Pro activation complete for:", user.email);
                } else {
                    document.getElementById('status-display').innerText = "⚠️ Payment Ref Not Detected.";
                    document.getElementById('status-display').style.color = "#f59e0b";
                }
            } else {
                document.getElementById('status-display').innerText = "Waiting for Login Session...";
            }
        });
    </script>
</body>
</html>
